<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Confirmation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6",
                        "background-light": "#F8FAFC",
                        "background-dark": "#0F172A",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center px-4 h-14">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="flex-1 text-center font-semibold text-lg pr-8">确认订单</h1>
</div>
</header>
<main class="p-4 pb-32 max-w-md mx-auto space-y-4">
<section class="bg-white dark:bg-slate-800 rounded-2xl p-5 ios-shadow space-y-4 border border-slate-50 dark:border-slate-700/50">
<div class="flex items-center gap-2 border-l-4 border-primary pl-3">
<span class="material-symbols-outlined text-primary text-xl">description</span>
<h2 class="font-bold text-slate-800 dark:text-white">订单信息</h2>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">酒店名称</span>
<span class="font-medium text-slate-800 dark:text-slate-100 text-right">北京酒店2</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">房型名称</span>
<span class="font-medium text-slate-800 dark:text-slate-100 text-right">大床房 / 豪华套房</span>
</div>
<div class="flex justify-between items-start text-sm">
<span class="text-slate-500 dark:text-slate-400 pt-0.5">入住/离店</span>
<div class="text-right">
<div class="flex items-center justify-end gap-1 font-medium text-slate-800 dark:text-slate-100">
<span class="material-symbols-outlined text-xs text-slate-400">calendar_month</span>
<span>2月25日 (今天) - 2月26日 (明天)</span>
</div>
<p class="text-xs text-slate-400 mt-1">共1晚</p>
</div>
</div>
<div class="pt-3 border-t border-slate-50 dark:border-slate-700/50 flex justify-between items-end">
<span class="font-bold text-slate-800 dark:text-white">应付金额</span>
<div class="text-right">
<span class="text-xs text-slate-400 line-through mr-2">¥150</span>
<span class="text-xl font-bold text-red-500">¥120</span>
</div>
</div>
</div>
</section>
<section class="bg-white dark:bg-slate-800 rounded-2xl p-5 ios-shadow space-y-5 border border-slate-50 dark:border-slate-700/50">
<div class="flex items-center gap-2 border-l-4 border-primary pl-3">
<span class="material-symbols-outlined text-primary text-xl">person</span>
<h2 class="font-bold text-slate-800 dark:text-white">入住信息</h2>
</div>
<div class="space-y-4">
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-600 dark:text-slate-400">住客姓名*</label>
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:outline-none placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="请输入住客姓名" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-600 dark:text-slate-400">联系手机*</label>
<div class="flex gap-2">
<div class="px-3 py-3 bg-slate-50 dark:bg-slate-900 rounded-xl text-slate-500 text-sm flex items-center shrink-0">+86</div>
<input class="flex-1 px-4 py-3 bg-slate-50 dark:bg-slate-900 border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:outline-none placeholder:text-slate-300 dark:placeholder:text-slate-600 transition-all" placeholder="请输入手机号码" type="tel"/>
</div>
</div>
</div>
</section>
<section class="bg-white dark:bg-slate-800 rounded-2xl p-5 ios-shadow space-y-4 border border-slate-50 dark:border-slate-700/50">
<div class="flex items-center gap-2 border-l-4 border-primary pl-3">
<span class="material-symbols-outlined text-primary text-xl">temp_preferences_custom</span>
<h2 class="font-bold text-slate-800 dark:text-white">特殊要求</h2>
</div>
<div class="flex flex-wrap gap-2 pt-2">
<button class="px-4 py-2 text-sm rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-primary/10 hover:border-primary/30 hover:text-primary transition-all">
                    无烟房
                </button>
<button class="px-4 py-2 text-sm rounded-full bg-primary/10 border border-primary/30 text-primary font-medium transition-all">
                    靠近电梯
                </button>
<button class="px-4 py-2 text-sm rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-primary/10 hover:border-primary/30 hover:text-primary transition-all">
                    高楼层
                </button>
<button class="px-4 py-2 text-sm rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-primary/10 hover:border-primary/30 hover:text-primary transition-all">
                    远离街道
                </button>
</div>
</section>
<div class="px-2">
<div class="flex items-start gap-2 p-3 bg-amber-50 dark:bg-amber-900/10 rounded-xl border border-amber-100 dark:border-amber-900/20">
<span class="material-symbols-outlined text-amber-500 text-sm mt-0.5">info</span>
<p class="text-xs text-amber-700 dark:text-amber-500 leading-relaxed">
                    温馨提示：订单确认后可在入住当天 18:00 前免费取消。逾期取消将扣除首晚房费。
                </p>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 px-6 py-4 pb-8 safe-area-bottom">
<div class="max-w-md mx-auto flex items-center justify-between gap-6">
<div class="flex flex-col">
<span class="text-xs text-slate-500 dark:text-slate-400">应付总额</span>
<div class="flex items-baseline gap-1">
<span class="text-red-500 font-bold text-2xl">¥120</span>
<span class="text-xs text-slate-400 font-normal">.00</span>
</div>
</div>
<button class="flex-1 bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/25 active:scale-[0.98] transition-all text-lg">
                确认支付
            </button>
</div>
</footer>
<div class="h-8"></div>

</body></html>
