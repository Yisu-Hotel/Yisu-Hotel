<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Minimalist Order Payment Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#007AFF",
                        "background-light": "#F8F9FA",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        display: ["Inter", "system-ui", "-apple-system", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', 'system-ui', '-apple-system', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen pb-28">
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50">
<div class="flex items-center justify-between px-4 py-4">
<button class="flex items-center text-slate-900 dark:text-white">
<span class="material-icons-round text-2xl">arrow_back_ios</span>
<span class="text-lg font-medium">返回</span>
</button>
<h1 class="text-lg font-semibold absolute left-1/2 -translate-x-1/2">订单支付</h1>
<div class="w-10"></div> 
</div>
</header>
<main class="max-w-md mx-auto p-4 space-y-4">
<section class="bg-white dark:bg-slate-900 rounded-2xl p-5 ios-shadow space-y-4">
<div class="flex justify-between items-start">
<h2 class="text-xl font-bold dark:text-white">北京酒店</h2>
<span class="text-orange-500 text-sm font-medium bg-orange-50 dark:bg-orange-500/10 px-2 py-1 rounded">待支付</span>
</div>
<div class="space-y-4 text-sm">
<div class="flex justify-between">
<span class="text-slate-400 dark:text-slate-500">订单号</span>
<span class="font-medium">ORDE8BED330</span>
</div>
<div class="flex justify-between gap-4">
<span class="text-slate-400 dark:text-slate-500 shrink-0">地址</span>
<span class="text-right text-slate-700 dark:text-slate-300">中国北京市东城区前门街道2号楼</span>
</div>
<div class="flex justify-between">
<span class="text-slate-400 dark:text-slate-500">房型</span>
<span class="font-medium">大床房</span>
</div>
<div class="flex justify-between">
<span class="text-slate-400 dark:text-slate-500">入住日期</span>
<span class="font-medium">2026-02-25 至 02-26</span>
</div>
<div class="flex justify-between">
<span class="text-slate-400 dark:text-slate-500">入住人</span>
<span class="font-medium">张晓大 15928078882</span>
</div>
<div class="flex justify-between">
<span class="text-slate-400 dark:text-slate-500">特殊要求</span>
<span class="font-medium">无</span>
</div>
<div class="flex justify-between">
<span class="text-slate-400 dark:text-slate-500">下单时间</span>
<span class="font-medium">2026/2/25 17:08:31</span>
</div>
</div>
<div class="pt-4 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
<span class="text-base font-semibold">订单总价</span>
<span class="text-2xl font-bold text-primary">¥120</span>
</div>
</section>
<section class="bg-white dark:bg-slate-900 rounded-2xl p-5 ios-shadow space-y-4">
<div class="flex items-center gap-2">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<h3 class="font-semibold text-lg">优惠券</h3>
</div>
<div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 text-center">
<p class="text-slate-400 dark:text-slate-500 text-sm">暂无可用优惠券</p>
</div>
</section>
<section class="bg-white dark:bg-slate-900 rounded-2xl p-5 ios-shadow space-y-4">
<div class="flex items-center gap-2 mb-2">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<h3 class="font-semibold text-lg">支付方式</h3>
</div>
<div class="space-y-1">
<label class="flex items-center justify-between py-4 cursor-pointer group">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-emerald-500 flex items-center justify-center text-white">
<span class="material-icons-round">qr_code_2</span>
</div>
<span class="font-medium">微信支付</span>
</div>
<input checked="" class="w-6 h-6 text-primary border-slate-300 dark:border-slate-600 focus:ring-offset-0 focus:ring-transparent rounded-full" name="payment" type="radio" value="wechat"/>
</label>
<div class="h-px bg-slate-50 dark:bg-slate-800"></div>
<label class="flex items-center justify-between py-4 cursor-pointer">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-blue-500 flex items-center justify-center text-white">
<span class="material-icons-round">account_balance_wallet</span>
</div>
<span class="font-medium">支付宝支付</span>
</div>
<input class="w-6 h-6 text-primary border-slate-300 dark:border-slate-600 focus:ring-offset-0 focus:ring-transparent rounded-full" name="payment" type="radio" value="alipay"/>
</label>
<div class="h-px bg-slate-50 dark:bg-slate-800"></div>
<label class="flex items-center justify-between py-4 cursor-pointer">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-blue-800 flex items-center justify-center text-white">
<span class="material-icons-round">credit_card</span>
</div>
<span class="font-medium">云闪付</span>
</div>
<input class="w-6 h-6 text-primary border-slate-300 dark:border-slate-600 focus:ring-offset-0 focus:ring-transparent rounded-full" name="payment" type="radio" value="unionpay"/>
</label>
</div>
</section>
</main>
<div class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-200/50 dark:border-slate-800/50 px-6 py-4 pb-8">
<div class="max-w-md mx-auto flex items-center justify-between gap-4">
<div class="flex flex-col">
<span class="text-xs text-slate-400 dark:text-slate-500">实付款</span>
<span class="text-2xl font-bold text-primary">¥120.00</span>
</div>
<button class="bg-primary hover:bg-blue-600 active:scale-95 transition-all text-white px-12 py-4 rounded-full font-bold text-lg shadow-lg shadow-primary/20">
                立即支付
            </button>
</div>
</div>

</body></html>
